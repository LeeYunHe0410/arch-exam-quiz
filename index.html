/* 空白填充 */
.spacer { height: 40px; }

": "C", "exp": "一般建筑排水立管设伸顶通气管即可满足要求"}, {"q": "钢筋混凝土梁的截面高度一般取跨度的：", "opts": ["A. 1/6~1/8", "B. 1/8~1/12", "C. 1/10~1/14", "D. 1/12~1/18"], "ans": "B", "exp": "简支梁截面高度一般为跨度的1/8~1/12"}, {"q": "建筑日照中，太阳高度角与地理纬度的关系是：", "opts": ["A. 纬度越高太阳高度角越大", "B. 纬度越低太阳高度角越大", "C. 无关", "D. 只有夏天有关"], "ans": "B", "exp": "纬度越低（越靠近赤道），太阳高度角越大"}, {"q": "采光系数C的定义是：", "opts": ["A. 室内照度/室外散射光照度", "B. 室外照度/室内照度", "C. 室内照度/室外总照度", "D. 窗口照度/室内照度"], "ans": "A", "exp": "采光系数=室内某点照度/同一时间室外天空漫射光照度×100%"}, {"q": "低压配电系统中，TN-S系统的特点：", "opts": ["A. 中性线和保护线合用", "B. 中性线和保护线分开", "C. 中性线接地", "D. 不接地系统"], "ans": "B", "exp": "TN-S系统的PE线和N线全部分开（S=Separate）"}, {"q": "混凝土强度等级C30中的\"30\"代表：", "opts": ["A. 抗拉强度标准值30MPa", "B. 立方体抗压强度标准值30MPa", "C. 轴心抗压强度标准值30MPa", "D. 弯曲抗压强度标准值30MPa"], "ans": "B", "exp": "C30表示混凝土立方体抗压强度标准值为30MPa（150mm边长立方体，28天龄期，95%保证率）"}]}, {"name": "建筑方案设计", "short": "方案", "color": "#8e44ad", "questions": [{"q": "方案作图中，建筑的采光要求中，普通教室窗地面积比不应小于：", "opts": ["A. 1/4", "B. 1/5", "C. 1/6", "D. 1/7"], "ans": "B", "exp": "教室窗地比≥1/5（采光系数不低于2%），美术教室要求更高"}, {"q": "展览馆展厅净高一般不低于（ ）：", "opts": ["A. 3.0m", "B. 3.5m", "C. 4.0m", "D. 4.5m"], "ans": "B", "exp": "展厅净高一般不低于3.5m，有大型展品时应更高"}, {"q": "建筑方案作图题评分标准中，最重要的评分项是：", "opts": ["A. 图面表达效果", "B. 功能关系和流线组织", "C. 立面造型美观", "D. 标注尺寸精确"], "ans": "B", "exp": "功能关系和流线组织是方案作图的核心评分项，占总分比重最大"}, {"q": "高层建筑中，防烟楼梯间的设置要求是：", "opts": ["A. 楼梯间设门即可", "B. 楼梯间入口设防烟的前室或阳台", "C. 楼梯间设窗户", "D. 楼梯间开向走廊"], "ans": "B", "exp": "防烟楼梯间在入口处设置防烟前室（面积≥6m²）或阳台/凹廊，前室设正压送风"}, {"q": "住宅方案设计中，卧室的最小使用面积（双人卧室）为（ ）：", "opts": ["A. 8m²", "B. 9m²", "C. 10m²", "D. 12m²"], "ans": "C", "exp": "双人卧室≥10m²（或9m²，因规范版本略有差异），单人卧室≥6m²"}, {"q": "高层公共建筑的疏散楼梯间形式，建筑高度大于32m的二类高层应采用：", "opts": ["A. 敞开楼梯间", "B. 封闭楼梯间", "C. 防烟楼梯间", "D. 室外楼梯"], "ans": "C", "exp": "一类高层和大于32m的二类高层应设防烟楼梯间；其他二类高层可设封闭楼梯间"}, {"q": "建筑方案设计中，无障碍入口的坡道坡度不宜大于（ ）：", "opts": ["A. 1:8", "B. 1:10", "C. 1:12", "D. 1:16"], "ans": "C", "exp": "无障碍坡道坡度不应大于1:12，每段坡道高度不超过0.75m，水平长度不超过9m"}, {"q": "老年人照料设施中，老年人居室短边净宽不宜小于（ ）：", "opts": ["A. 2.4m", "B. 3.0m", "C. 3.6m", "D. 4.0m"], "ans": "B", "exp": "老年人居室短边净宽≥3.0m，以方便轮椅通行和护理"}, {"q": "文化馆设计中，观演用房与阅览用房的布局关系应该是：", "opts": ["A. 紧密相邻", "B. 分区设置、互不干扰", "C. 上下叠加", "D. 穿套布置"], "ans": "B", "exp": "动静分区原则，观演区（动、吵）与阅览区（静）应分开，避免噪声干扰"}, {"q": "下列哪种功能关系在方案设计中属于应避免的？", "opts": ["A. 洁净区与污染区相邻", "B. 安静区与嘈杂区直接相邻无隔离", "C. 公共区靠近主入口", "D. 服务区靠近后勤入口"], "ans": "B", "exp": "动静分区、洁污分区是基本原则，安静区与嘈杂区应有效隔离"}, {"q": "建筑方案设计作图中，考生最常犯的错误是：", "opts": ["A. 面积分配不当和流线混乱", "B. 图纸不美观", "C. 标注太多", "D. 线条不整齐"], "ans": "A", "exp": "最常见错误：面积超差、功能区之间关系混乱、疏散距离不够、漏画关键房间"}, {"q": "建筑方案设计考试中，关于平面功能气泡图的说法，正确的是：", "opts": ["A. 气泡图是必须交图的成果", "B. 气泡图是分析功能关系的工具，不需要交图", "C. 气泡图代表建筑外观", "D. 气泡图就是总平面图"], "ans": "B", "exp": "气泡图是审题分析阶段的功能关系工具，帮助理清各功能区的关系，不需要在成果图中体现"}, {"q": "方案作图中，当建筑有不同标高层时，应特别注意：", "opts": ["A. 立面造型", "B. 无障碍设计（坡道、电梯）", "C. 装修效果", "D. 绿化面积"], "ans": "B", "exp": "不同标高之间必须设置无障碍坡道或电梯，这是常考的规范要点"}, {"q": "方案作图中，关于总平面图的要求，不正确的是：", "opts": ["A. 需标注出入口位置", "B. 需标注场地与道路的关系", "C. 需标注建筑外包尺寸", "D. 不需要画绿化"], "ans": "D", "exp": "总平面图中应包含出入口、道路关系、建筑外包尺寸、绿化（至少示意）"}, {"q": "图书馆设计中，书库与阅览室的关系宜采用：", "opts": ["A. 分散在两侧", "B. 书库在内、阅览在外", "C. 书库在外、阅览在内", "D. 两者并列布置"], "ans": "B", "exp": "书库在内（核心区）、阅览在外（周边），便于管理且减少搬运距离"}]}];

// 状态：每道题是否已作答及是否正确
const state = {};
// 各科目题数
const subjectTotal = {};
const subjectCorrect = {};

function init() {
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');
  let totalQ = 0;

  DATA.forEach((subj, si) => {
    subjectTotal[si] = subj.questions.length;
    subjectCorrect[si] = 0;
    totalQ += subj.questions.length;

    // Tab按钮
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (si === 0 ? ' active' : '');
    btn.style.setProperty('--subject-color', subj.color);
    btn.textContent = subj.short + '(' + subj.questions.length + ')';
    btn.onclick = () => switchTab(si);
    btn.id = 'tab-' + si;
    tabs.appendChild(btn);

    // 面板
    const panel = document.createElement('div');
    panel.className = 'subject-panel' + (si === 0 ? ' active' : '');
    panel.id = 'panel-' + si;
    panel.style.setProperty('--subject-color', subj.color);

    // 进度条
    const prog = document.createElement('div');
    prog.innerHTML = `
      <div class="progress-wrap"><div class="progress-bar" id="prog-${si}" style="background:${subj.color}"></div></div>
      <div class="progress-text" id="prog-text-${si}">0 / ${subj.questions.length}</div>
    `;
    panel.appendChild(prog);

    // 各题
    subj.questions.forEach((q, qi) => {
      const key = si + '_' + qi;
      state[key] = null; // null=未答, true=答对, false=答错

      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'card-' + key;

      const opts_html = q.opts.map((opt, oi) => {
        const label = opt[0]; // A B C D
        const text = opt.slice(3);
        return `<button class="opt-btn" id="opt-${key}-${oi}" onclick="answer('${key}','${label}','${q.ans}')">
          <span class="opt-label">${label}</span>
          <span>${text}</span>
        </button>`;
      }).join('');

      card.innerHTML = `
        <div class="q-num">第${qi+1}题</div>
        <div class="q-text">${q.q}</div>
        <div class="opts" id="opts-${key}">${opts_html}</div>
        <div class="analysis" id="anal-${key}">
          <div class="analysis-title">💡 解析</div>
          ${q.exp}
        </div>
      `;
      panel.appendChild(card);
    });

    panels.appendChild(panel);
  });

  document.getElementById('total-count').textContent = totalQ;
  updateScoreBar();
}

function switchTab(si) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===si));
  document.querySelectorAll('.subject-panel').forEach((p,i) => p.classList.toggle('active', i===si));
}

function answer(key, chosen, correct) {
  if (state[key] !== null) return; // 已作答
  
  const isCorrect = chosen === correct;
  state[key] = isCorrect;

  // 解析科目索引
  const si = parseInt(key.split('_')[0]);
  
  // 更新所有选项样式
  const optsContainer = document.getElementById('opts-' + key);
  optsContainer.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const lbl = btn.querySelector('.opt-label').textContent;
    if (lbl === correct) btn.classList.add('show-correct');
    if (lbl === chosen && chosen !== correct) btn.classList.add('wrong');
    if (lbl === chosen && chosen === correct) btn.classList.add('correct');
  });

  // 显示解析
  document.getElementById('anal-' + key).classList.add('show');

  // 更新计分
  if (isCorrect) subjectCorrect[si]++;
  
  // 更新进度
  updateProgress(si);
  updateScoreBar();
}

function updateProgress(si) {
  const answered = Object.entries(state)
    .filter(([k]) => k.startsWith(si + '_') && state[k] !== null).length;
  const total = subjectTotal[si];
  const pct = (answered / total * 100).toFixed(0);
  const bar = document.getElementById('prog-' + si);
  if (bar) bar.style.width = pct + '%';
  const txt = document.getElementById('prog-text-' + si);
  if (txt) txt.textContent = `已答 ${answered} / ${total} 题，答对 ${subjectCorrect[si]} 题`;
}

function updateScoreBar() {
  const bar = document.getElementById('score-bar');
  bar.innerHTML = DATA.map((s,si) => {
    const total = subjectTotal[si];
    const correct = subjectCorrect[si];
    const answered = Object.entries(state).filter(([k]) => k.startsWith(si+'_') && state[k]!==null).length;
    if (answered === 0) return `<span class="score-tag" style="border:1px solid ${s.color};color:${s.color}">${s.short} -</span>`;
    const pct = Math.round(correct/answered*100);
    return `<span class="score-tag" style="background:${s.color}20;border:1px solid ${s.color};color:${s.color}">${s.short} ${correct}/${answered} (${pct}%)</span>`;
  }).join('');
}

init();
</script>
