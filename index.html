<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>一建刷题 2026-04-05</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #222;
  font-size: 15px;
  padding-bottom: 70px;
}
/* 顶栏 */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  padding: 16px 16px 12px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.header h1 { font-size: 17px; font-weight: 700; }
.header .meta { font-size: 12px; color: #aab; margin-top: 4px; }
.score-bar {
  display: flex; gap: 12px; margin-top: 10px;
  flex-wrap: wrap;
}
.score-tag {
  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  white-space: nowrap;
}
/* 科目 Tab */
.tabs {
  display: flex; overflow-x: auto; background: #fff;
  border-bottom: 2px solid #e8e8e8;
  padding: 0 8px;
  position: sticky; top: 72px; z-index: 99;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 12px 16px;
  border: none; background: none;
  font-size: 14px; color: #666;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab-btn.active {
  color: var(--subject-color);
  border-bottom-color: var(--subject-color);
  font-weight: 600;
}
/* 科目内容 */
.subject-panel { display: none; padding: 12px; }
.subject-panel.active { display: block; }
/* 题目卡片 */
.q-card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  transition: box-shadow 0.2s;
}
.q-num {
  font-size: 11px;
  color: #999;
  margin-bottom: 8px;
  font-weight: 500;
  text-transform: uppercase;
}
.q-text {
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 12px;
  font-weight: 500;
}
/* 选项 */
.opts { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  display: flex; align-items: flex-start; gap: 10px;
  background: #f7f8fa;
  border: 2px solid #e8e8e8;
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  line-height: 1.5;
  transition: all 0.15s;
  width: 100%;
  color: #333;
}
.opt-btn:active { transform: scale(0.98); }
.opt-label {
  font-weight: 700;
  font-size: 14px;
  min-width: 20px;
  flex-shrink: 0;
}
/* 答题结果状态 */
.opt-btn.correct {
  background: #edfaf1;
  border-color: #27ae60;
  color: #1e8449;
}
.opt-btn.wrong {
  background: #fdf2f0;
  border-color: #e74c3c;
  color: #c0392b;
}
.opt-btn.show-correct {
  background: #edfaf1;
  border-color: #27ae60;
  color: #1e8449;
}
.opt-btn:disabled {
  cursor: default;
}
/* 解析 */
.analysis {
  margin-top: 12px;
  background: #fffbe6;
  border-left: 4px solid #f39c12;
  border-radius: 0 8px 8px 0;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.7;
  display: none;
  color: #555;
}
.analysis.show { display: block; }
.analysis-title { font-weight: 700; color: #e67e22; margin-bottom: 4px; }
/* 结果标记 */
.result-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 20px;
  margin-top: 10px;
}
.badge-correct { background: #edfaf1; color: #27ae60; }
.badge-wrong   { background: #fdf2f0; color: #e74c3c; }
/* 进度条 */
.progress-wrap {
  background: #eee;
  border-radius: 4px;
  height: 4px;
  margin: 8px 0 4px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 4px;
  background: var(--subject-color);
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text {
  font-size: 11px;
  color: #999;
  text-align: right;
}
/* 科目得分 */
.subj-score {
  background: #fff;
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.subj-score-info { font-size: 13px; color: #666; }
.subj-score-num { font-size: 20px; font-weight: 800; }
/* 重新作答按钮 */
.reset-btn {
  display: block;
  width: calc(100% - 24px);
  margin: 0 12px 20px;
  padding: 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(102,126,234,0.4);
}
.reset-btn:active { transform: scale(0.97); }

/* ===== 错题本样式 ===== */
/* 错题 Tab 上的红点 */
.wrong-tab-badge {
  position: relative;
}
.wrong-tab-badge .dot {
  position: absolute;
  top: 8px;
  right: 4px;
  width: 8px;
  height: 8px;
  background: #e74c3c;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
/* 错题本头部 */
.wrong-header {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.wrong-stats {
  display: flex;
  justify-content: space-around;
  text-align: center;
  margin-bottom: 12px;
}
.wrong-stat-num {
  font-size: 24px;
  font-weight: 800;
  color: #e74c3c;
}
.wrong-stat-label {
  font-size: 11px;
  color: #999;
  margin-top: 2px;
}
.wrong-stat-num.mastered { color: #27ae60; }
/* 错题筛选 */
.wrong-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.wrong-filter-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1.5px solid #ddd;
  background: #fff;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: #666;
}
.wrong-filter-btn.active {
  background: #e74c3c;
  color: #fff;
  border-color: #e74c3c;
}
/* 错题卡片 */
.wrong-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border-left: 4px solid #e74c3c;
}
.wrong-card.mastered {
  border-left-color: #27ae60;
  opacity: 0.7;
}
.wrong-card .wrong-subj {
  font-size: 11px;
  font-weight: 600;
  color: #999;
  margin-bottom: 6px;
}
.wrong-card .wrong-q {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 8px;
}
.wrong-card .wrong-answer {
  font-size: 13px;
  color: #e74c3c;
  margin-bottom: 6px;
}
.wrong-card .wrong-correct {
  font-size: 13px;
  color: #27ae60;
  margin-bottom: 6px;
}
.wrong-card .wrong-exp {
  font-size: 12px;
  color: #888;
  background: #f9f9f9;
  padding: 8px 10px;
  border-radius: 6px;
  line-height: 1.6;
  margin-bottom: 8px;
}
.wrong-card .wrong-meta {
  font-size: 11px;
  color: #bbb;
}
.wrong-card .wrong-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.wrong-action-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: none;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-master {
  background: #edfaf1;
  color: #27ae60;
  border: 1px solid #27ae60;
}
.btn-master:active { background: #27ae60; color: #fff; }
.btn-unmaster {
  background: #f9f9f9;
  color: #999;
  border: 1px solid #ddd;
}
.btn-unmaster:active { background: #999; color: #fff; }
.btn-remove {
  background: #fdf2f0;
  color: #e74c3c;
  border: 1px solid #e74c3c;
}
.btn-remove:active { background: #e74c3c; color: #fff; }
/* 错题本底部操作 */
.wrong-footer {
  padding: 16px;
  text-align: center;
}
.btn-clear-all {
  padding: 10px 24px;
  border-radius: 10px;
  border: 1.5px solid #e74c3c;
  background: #fff;
  color: #e74c3c;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-clear-all:active { background: #e74c3c; color: #fff; }
/* 空状态 */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #ccc;
}
.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
}
.empty-state .empty-text {
  font-size: 14px;
}
/* 空白填充 */
.spacer { height: 40px; }

/* 确认弹窗 */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 85%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 10px;
}
.modal-desc {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
  line-height: 1.5;
}
.modal-btns {
  display: flex;
  gap: 10px;
}
.modal-btn {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.modal-btn-cancel {
  background: #f0f0f0;
  color: #666;
}
.modal-btn-confirm {
  background: #e74c3c;
  color: #fff;
}
</style>
</head>
<body>

<div class="header">
  <h1>📝 一建刷题 · 2026-04-05</h1>
  <div class="meta">距考试 <b style="color:#ffd700">40</b> 天 · 共 <span id="total-count">0</span> 题</div>
  <div class="score-bar" id="score-bar"></div>
</div>

<div class="tabs" id="tabs"></div>

<div id="panels"></div>

<div class="spacer"></div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">确认操作</div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn modal-btn-confirm" id="modal-confirm" onclick="modalConfirm()">确认</button>
    </div>
  </div>
</div>

<script>
const DATA = [{"name": "建筑材料与构造", "short": "材料", "color": "#e74c3c", "questions": [{"q": "钢结构用钢材的主要成分是：", "opts": ["A. 纯铁", "B. 铁碳合金（含碳量<2%）", "C. 铁碳合金（含碳量>2%）", "D. 铜锌合金"], "ans": "B", "exp": "钢是含碳量小于2%的铁碳合金；含碳量>2%为铸铁"}, {"q": "建筑玻璃中，安全玻璃包括：", "opts": ["A. 钢化玻璃和夹层玻璃", "B. 普通平板玻璃和浮法玻璃", "C. 磨砂玻璃和压花玻璃", "D. 热反射玻璃和吸热玻璃"], "ans": "A", "exp": "安全玻璃包括钢化玻璃（破碎后为钝角小颗粒）和夹层玻璃（碎片粘在一起）"}, {"q": "屋面防水等级为Ⅰ级时，防水层合理使用年限为（ ）年：", "opts": ["A. 10年", "B. 15年", "C. 20年", "D. 25年"], "ans": "C", "exp": "Ⅰ级防水20年（2道防水设防）；Ⅱ级15年（2道）；Ⅲ级10年（1道）；Ⅳ级5年（1道）"}, {"q": "楼梯踏步踢面高度一般不宜超过（ ），踏面宽度不宜小于（ ）：", "opts": ["A. 160mm，260mm", "B. 175mm，260mm", "C. 180mm，280mm", "D. 200mm，300mm"], "ans": "B", "exp": "一般楼梯：踢面≤175mm（宜150-175mm），踏面≥260mm（宜260-300mm）"}, {"q": "倒置式屋面的构造层次从下到上依次是：", "opts": ["A. 结构层→防水层→保温层", "B. 结构层→保温层→防水层", "C. 结构层→找平层→防水层→保温层→保护层", "D. 结构层→防水层→保温层→保护层"], "ans": "D", "exp": "倒置式屋面：防水层在下、保温层（挤塑板等）在上、保护层最上，保温层保护防水层"}, {"q": "建筑砂浆按用途分类不包括：", "opts": ["A. 砌筑砂浆", "B. 抹面砂浆", "C. 防水砂浆", "D. 结构砂浆"], "ans": "D", "exp": "砂浆按用途分为砌筑砂浆、抹面砂浆、防水砂浆、装饰砂浆等，没有'结构砂浆'的分类"}, {"q": "硅酸盐水泥的初凝时间不得早于（ ），终凝时间不得迟于（ ）：", "opts": ["A. 30min，6.5h", "B. 45min，10h", "C. 45min，6.5h", "D. 60min，10h"], "ans": "C", "exp": "硅酸盐水泥初凝≥45min，终凝≤6.5h；普通水泥终凝≤10h"}, {"q": "建筑涂料中，内墙涂料不推荐使用：", "opts": ["A. 乳胶漆", "B. 水溶性涂料", "C. 溶剂型涂料", "D. 无机涂料"], "ans": "C", "exp": "溶剂型涂料含有机挥发物(VOC)，不适合室内使用；应选水性涂料（乳胶漆等）"}, {"q": "加气混凝土砌块的最低强度等级为：", "opts": ["A. A1.0", "B. A2.5", "C. A5.0", "D. A7.5"], "ans": "B", "exp": "加气混凝土砌块强度等级有A1.0/A2.5/A3.5/A5.0/A7.5，最低A2.5（承重用时≥A5.0）"}, {"q": "普通烧结砖的规格为：", "opts": ["A. 240×115×90mm", "B. 240×115×53mm", "C. 190×190×90mm", "D. 300×150×75mm"], "ans": "B", "exp": "标准烧结砖240×115×53mm（含灰缝250×120×60mm的模数制）"}, {"q": "HPB300钢筋中的300代表：", "opts": ["A. 抗拉强度标准值300MPa", "B. 屈服强度标准值300MPa", "C. 弹性模量300GPa", "D. 极限应变300με"], "ans": "B", "exp": "HPB300屈服强度标准值300MPa（热轧光圆钢筋）；HRB400屈服强度标准值400MPa"}, {"q": "下列材料中，属于气硬性胶凝材料的是：", "opts": ["A. 水泥", "B. 石膏", "C. 沥青", "D. 合成树脂"], "ans": "B", "exp": "石膏、石灰、水玻璃为气硬性胶凝材料（只能在空气中硬化）；水泥为水硬性胶凝材料"}, {"q": "圈梁设置的位置是：", "opts": ["A. 墙体中部", "B. 楼层标高处沿墙四周连续封闭", "C. 基础底部", "D. 屋顶上方"], "ans": "B", "exp": "圈梁设在楼盖标高处（屋盖处必须设），沿墙四周连续封闭形成水平箍"}, {"q": "钢材的冷弯性能主要检验：", "opts": ["A. 强度", "B. 塑性", "C. 韧性", "D. 硬度"], "ans": "B", "exp": "冷弯试验检验钢材在常温下承受弯曲变形的能力，反映塑性和内部缺陷"}, {"q": "建筑中常用的保温材料不包括：", "opts": ["A. 岩棉", "B. 聚苯乙烯泡沫", "C. 玻璃棉", "D. 石膏板"], "ans": "D", "exp": "石膏板主要用于隔墙和吊顶，不属于保温材料。岩棉、EPS/XPS泡沫、玻璃棉是常用保温材料"}, {"q": "混凝土中砂率是指：", "opts": ["A. 砂占混凝土总重量的百分比", "B. 砂占骨料总重量的百分比", "C. 砂的含水率", "D. 砂的细度模数"], "ans": "B", "exp": "砂率 = 砂质量 / (砂质量 + 石子质量) × 100%"}, {"q": "散水（排水坡）的宽度一般不应小于（ ）：", "opts": ["A. 500mm", "B. 600mm", "C. 800mm", "D. 1000mm"], "ans": "B", "exp": "散水宽度≥600mm，坡度3%-5%，与勒脚交接处设沉降缝"}, {"q": "石材的吸水率与耐久性的关系是：", "opts": ["A. 吸水率越大越耐久", "B. 吸水率越小越耐久", "C. 无关", "D. 吸水率=0最耐久"], "ans": "B", "exp": "吸水率越小，说明石材孔隙少、致密，抗冻性和耐久性越好"}, {"q": "地下室防水采用防水混凝土时，抗渗等级不应低于：", "opts": ["A. P4", "B. P6", "C. P8", "D. P10"], "ans": "B", "exp": "防水混凝土设计抗渗等级不应低于P6，埋深越大要求越高（如埋深10m要求P8）"}, {"q": "变形缝中，伸缩缝的设置主要考虑的因素是：", "opts": ["A. 地基不均匀沉降", "B. 温度变化引起的结构伸缩", "C. 地震作用", "D. 施工缝留设"], "ans": "B", "exp": "伸缩缝（温度缝）应对温度变形；沉降缝应对不均匀沉降；防震缝应对地震"}]}, {"name": "建筑设计", "short": "设计", "color": "#2980b9", "questions": [{"q": "医院建筑中，病房门的净宽不应小于：", "opts": ["A. 0.9m", "B. 1.0m", "C. 1.1m", "D. 1.2m"], "ans": "C", "exp": "综合医院建筑设计规范：病房门净宽≥1.1m"}, {"q": "建筑体型系数是指：", "opts": ["A. 建筑物周长与底面积之比", "B. 建筑物外表面积与体积之比", "C. 建筑物高度与宽度之比", "D. 窗墙面积比"], "ans": "B", "exp": "体型系数=建筑物外表面积/包围体积，是节能设计的重要指标"}, {"q": "教室课桌面的采光系数最低值不应低于：", "opts": ["A. 1%", "B. 2%", "C. 3%", "D. 5%"], "ans": "B", "exp": "建筑采光设计标准：教室课桌面采光系数不低于2%"}, {"q": "建筑日照标准中，冬至日满窗日照时间不应少于：", "opts": ["A. 0.5小时", "B. 1小时", "C. 2小时", "D. 3小时"], "ans": "B", "exp": "住宅建筑日照标准：大寒日不少于2h（旧标准冬至日≥1h）"}, {"q": "绿色建筑评价标准中，绿色建筑分为几个等级？", "opts": ["A. 二个等级", "B. 三个等级", "C. 四个等级", "D. 五个等级"], "ans": "B", "exp": "新版绿色建筑评价标准（GB/T 50378）将绿色建筑分为基本级、一星、二星、三星，但实际评价为一星至三星三个等级"}, {"q": "普通住宅卧室内的允许噪声级（A声级）昼间为：", "opts": ["A. ≤37dB", "B. ≤40dB", "C. ≤45dB", "D. ≤50dB"], "ans": "C", "e const WRONG_KEY = 'arch_exam_wrong_questions';
let wrongList = []; // {qHash, q, opts, ans, exp, subjectName, subjectShort, subjectColor, chosen, date, mastered}
let wrongFilter = 'unmastered'; // all | unmastered | mastered

function loadWrongList() {
  try {
    const raw = localStorage.getItem(WRONG_KEY);
    wrongList = raw ? JSON.parse(raw) : [];
  } catch(e) {
    wrongList = [];
  }
}

function saveWrongList() {
  localStorage.setItem(WRONG_KEY, JSON.stringify(wrongList));
  updateWrongTabBadge();
}

// 生成题目唯一 hash（用于去重）
function qHash(q, opts) {
  const str = q + JSON.stringify(opts);
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const ch = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash |= 0;
  }
  return 'q_' + Math.abs(hash).toString(36);
}

// 添加错题
function addToWrongList(key, isCorrect, si, qi) {
  const subj = DATA[si];
  const q = subj.questions[qi];
  const h = qHash(q.q, q.opts);
  
  // 如果已存在，不重复添加
  const idx = wrongList.findIndex(w => w.qHash === h);
  if (idx >= 0) {
    // 更新：如果之前标记了已掌握，现在又答错了，取消掌握
    if (isCorrect === false && wrongList[idx].mastered) {
      wrongList[idx].mastered = false;
      wrongList[idx].chosen = state[key] ? q.ans : q.ans; // record
      wrongList[idx].date = new Date().toLocaleDateString('zh-CN');
      saveWrongList();
    }
    return;
  }
  
  // 新增错题
  if (isCorrect === false) {
    // 找到用户选的选项
    const chosen = getChosenAnswer(key, q.ans);
    wrongList.push({
      qHash: h,
      q: q.q,
      opts: q.opts,
      ans: q.ans,
      exp: q.exp,
      subjectName: subj.name,
      subjectShort: subj.short,
      subjectColor: subj.color,
      chosen: chosen,
      date: new Date().toLocaleDateString('zh-CN'),
      mastered: false
    });
    saveWrongList();
  }
}

// 获取用户选的答案
function getChosenAnswer(key, correctAns) {
  const container = document.getElementById('opts-' + key);
  if (!container) return '?';
  const btns = container.querySelectorAll('.opt-btn');
  for (const btn of btns) {
    if (btn.classList.contains('wrong')) {
      return btn.querySelector('.opt-label').textContent;
    }
  }
  return correctAns;
}

// 标记已掌握
function markMastered(qHash) {
  const item = wrongList.find(w => w.qHash === qHash);
  if (item) {
    item.mastered = true;
    saveWrongList();
    renderWrongPanel();
  }
}

// 取消掌握
function unmarkMastered(qHash) {
  const item = wrongList.find(w => w.qHash === qHash);
  if (item) {
    item.mastered = false;
    saveWrongList();
    renderWrongPanel();
  }
}

// 删除单题
function removeWrong(qHash) {
  wrongList = wrongList.filter(w => w.qHash !== qHash);
  saveWrongList();
  renderWrongPanel();
}

// 清空所有错题
function clearAllWrong() {
  showModal('清空错题本', '确定清空所有错题记录吗？此操作不可撤销。', () => {
    wrongList = [];
    saveWrongList();
    renderWrongPanel();
  });
}

// 更新错题 Tab 上的红点
function updateWrongTabBadge() {
  const tab = document.getElementById('tab-wrong');
  if (!tab) return;
  const unmastered = wrongList.filter(w => !w.mastered).length;
  let dot = tab.querySelector('.dot');
  if (unmastered > 0) {
    if (!dot) {
      dot = document.createElement('span');
      dot.className = 'dot';
      tab.style.position = 'relative';
      tab.appendChild(dot);
    }
  } else {
    if (dot) dot.remove();
  }
}

        <div>
          <div class="wrong-stat-num">${unmastered}</div>
          <div class="wrong-stat-label">待攻克</div>
        </div>
        <div>
          <div class="wrong-stat-num mastered">${mastered}</div>
          <div class="wrong-stat-label">已掌握</div>
        </div>
      </div>
      <div class="wrong-filter">
        <button class="wrong-filter-btn ${wrongFilter==='all'?'active':''}" onclick="setWrongFilter('all')">全部 (${total})</button>
        <button class="wrong-filter-btn ${wrongFilter==='unmastered'?'active':''}" onclick="setWrongFilter('unmastered')">待攻克 (${unmastered})</button>
        <button class="wrong-filter-btn ${wrongFilter==='mastered'?'active':''}" onclick="setWrongFilter('mastered')">已掌握 (${mastered})</button>
      </div>
    </div>
  `;
  
  if (filtered.length === 0) {
    const emptyMsg = wrongFilter === 'mastered' ? '还没有掌握的错题' : 
                     wrongFilter === 'unmastered' ? '🎉 所有错题已掌握！' : '暂无错题，继续加油！';
    const emptyIcon = wrongFilter === 'unmastered' && total > 0 ? '🏆' : '📖';
    html += `<div class="empty-state"><div class="empty-icon">${emptyIcon}</div><div class="empty-text">${emptyMsg}</div></div>`;
  } else {
    filtered.forEach(w => {
      const masteredClass = w.mastered ? ' mastered' : '';
      const chosenLabel = w.chosen ? w.chosen.toUpperCase() : '?';
      html += `
        <div class="wrong-card${masteredClass}">
          <div class="wrong-subj" style="color:${w.subjectColor}">${w.subjectShort} · ${w.date}</div>
          <div class="wrong-q">${w.q}</div>
          <div class="wrong-answer">❌ 你的答案: ${chosenLabel}</div>
          <div class="wrong-correct">✅ 正确答案: ${w.ans}</div>
          <div class="wrong-exp">${w.exp}</div>
          <div class="wrong-actions">
            ${w.mastered 
              ? `<button class="wrong-action-btn btn-unmaster" onclick="unmarkMastered('${w.qHash}')">取消掌握</button>` 
              : `<button class="wrong-action-btn btn-master" onclick="markMastered('${w.qHash}')">✓ 标记已掌握</button>`}
            <button class="wrong-action-btn btn-remove" onclick="removeWrong('${w.qHash}')">删除</button>
          </div>
        </div>
      `;
    });
  }
  
  if (total > 0) {
    html += `
      <div class="wrong-footer">
        <button class="btn-clear-all" onclick="clearAllWrong()">🗑️ 清空所有错题</button>
      </div>
    `;
  }
  
  panel.innerHTML = html;
}

function setWrongFilter(f) {
  wrongFilter = f;
  renderWrongPanel();
}

// 弹窗
function showModal(title, desc, callback) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  document.getElementById('modal').classList.add('show');
  modalCallback = callback;
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  modalCallback = null;
}
function modalConfirm() {
  if (modalCallback) modalCallback();
  closeModal();
}


// ===== 主体逻辑 =====
function init() {
  loadWrongList();
  
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');
  let totalQ = 0;

  DATA.forEach((subj, si) => {
    subjectTotal[si] = subj.questions.length;
    subjectCorrect[si] = 0;
    totalQ += subj.questions.length;

    // Tab按钮
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (si === 0 ? ' active' : '');
    btn.style.setProperty('--subject-color', subj.color);
    btn.textContent = subj.short + '(' + subj.questions.length + ')';
    btn.onclick = () => switchTab(si);
    btn.id = 'tab-' + si;
    tabs.appendChild(btn);

    // 面板
    const panel = document.createElement('div');
    panel.className = 'subject-panel' + (si === 0 ? ' active' : '');
    panel.id = 'panel-' + si;
    panel.style.setProperty('--subject-color', subj.color);

    // 进度条
    const prog = document.createElement('div');
    prog.innerHTML = `
      <div class="progress-wrap"><div class="progress-bar" id="prog-${si}" style="background:${subj.color}"></div></div>
      <div class="progress-text" id="prog-text-${si}">0 / ${subj.questions.length}</div>
    `;
    panel.appendChild(prog);

    // 各题
    subj.questions.forEach((q, qi) => {
      const key = si + '_' + qi;
      state[key] = null; // null=未答, true=答对, false=答错

      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = 'card-' + key;

      const opts_html = q.opts.map((opt, oi) => {
        const label = opt[0]; // A B C D
        const text = opt.slice(3);
        return `<button class="opt-btn" id="opt-${key}-${oi}" onclick="answer('${key}','${label}','${q.ans}')">
          <span class="opt-label">${label}</span>
          <span>${text}</span>
        </button>`;
      }).join('');

      card.innerHTML = `
        <div class="q-num">第${qi+1}题</div>
        <div class="q-text">${q.q}</div>
        <div class="opts" id="opts-${key}">${opts_html}</div>
        <div class="analysis" id="anal-${key}">
          <div class="analysis-title">💡 解析</div>
          ${q.exp}
        </div>
      `;
      panel.appendChild(card);
    });

    panels.appendChild(panel);
  });

  // 错题本 Tab
  const wrongBtn = document.createElement('button');
  wrongBtn.className = 'tab-btn wrong-tab-badge';
  wrongBtn.id = 'tab-wrong';
  wrongBtn.style.setProperty('--subject-color', '#e74c3c');
  wrongBtn.innerHTML = '错题本';
  wrongBtn.onclick = () => switchTab('wrong');
  tabs.appendChild(wrongBtn);

  // 错题本面板
  const wrongPanel = document.createElement('div');
  wrongPanel.className = 'subject-panel';
  wrongPanel.id = 'panel-wrong';
  wrongPanel.style.setProperty('--subject-color', '#e74c3c');
  panels.appendChild(wrongPanel);

  document.getElementById('total-count').textContent = totalQ;
  updateScoreBar();
  renderWrongPanel();
  updateWrongTabBadge();
}

function switchTab(si) {
  // si 可能是数字或 'wrong'
  const allTabBtns = document.querySelectorAll('.tab-btn');
  const allPanels = document.querySelectorAll('.subject-panel');
  allTabBtns.forEach(b => b.classList.remove('active'));
  allPanels.forEach(p => p.classList.remove('active'));
  
  if (si === 'wrong') {
    document.getElementById('tab-wrong').classList.add('active');
    document.getElementById('panel-wrong').classList.add('active');
    // 清除红点
    const dot = document.getElementById('tab-wrong').querySelector('.dot');
    if (dot) dot.style.display = 'none';
  } else {
    const btn = document.getElementById('tab-' + si);
    const panel = document.getElementById('panel-' + si);
    if (btn) btn.classList.add('active');
    if (panel) panel.classList.add('active');
  }
}

function answer(key, chosen, correct) {
  if (state[key] !== null) return; // 已作答
  
  const isCorrect = chosen === correct;
  state[key] = isCorrect;

  // 解析科目索引和题号
  const parts = key.split('_');
  const si = parseInt(parts[0]);
  const qi = parseInt(parts[1]);
  
  // 更新所有选项样式
  const optsContainer = document.getElementById('opts-' + key);
  optsContainer.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const lbl = btn.querySelector('.opt-label').textContent;
    if (lbl === correct) btn.classList.add('show-correct');
    if (lbl === chosen && chosen !== correct) btn.classList.add('wrong');
    if (lbl === chosen && chosen === correct) btn.classList.add('correct');
  });

  // 显示解析
  document.getElementById('anal-' + key).classList.add('show');

  // 更新计分
  if (isCorrect) subjectCorrect[si]++;
  
  // 更新进度
  updateProgress(si);
  updateScoreBar();
  
  // ===== 错题本：答错自动加入 =====
  addToWrongList(key, isCorrect, si, qi);
  updateWrongTabBadge();
}

function updateProgress(si) {
  const answered = Object.entries(state)
    .filter(([k]) => k.startsWith(si + '_') && state[k] !== null).length;
  const total = subjectTotal[si];
  const pct = (answered / total * 100).toFixed(0);
  const bar = document.getElementById('prog-' + si);
  if (bar) bar.style.width = pct + '%';
  const txt = document.getElementById('prog-text-' + si);
  if (txt) txt.textContent = `已答 ${answered} / ${total} 题，答对 ${subjectCorrect[si]} 题`;
}

function updateScoreBar() {
  const bar = document.getElementById('score-bar');
  bar.innerHTML = DATA.map((s,si) => {
    const total = subjectTotal[si];
    const correct = subjectCorrect[si];
    const answered = Object.entries(state).filter(([k]) => k.startsWith(si+'_') && state[k]!==null).length;
    if (answered === 0) return `<span class="score-tag" style="border:1px solid ${s.color};color:${s.color}">${s.short} -</span>`;
    const pct = Math.round(correct/answered*100);
    return `<span class="score-tag" style="background:${s.color}20;border:1px solid ${s.color};color:${s.color}">${s.short} ${correct}/${answered} (${pct}%)</span>`;
  }).join('');
}

init();
</script>
</body>
</html>
